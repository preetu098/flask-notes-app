<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Notes</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

    <div class="container py-5">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold text-primary">
                <i class="bi bi-journal-text"></i> All Notes
            </h1>

            <a href="/add">
                <button class="btn btn-success">
                    <i class="bi bi-plus-circle"></i> Add Note
                </button>
            </a>
        </div>

        <!-- Notes Card -->
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Notes List</h4>
            </div>

            <div class="card-body">

                {% if note %}

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>#</th>
                                <th>Title</th>
                                <th>Description</th>
                                <th width="120">Edit</th>
                                <th width="120">Delete</th>
                            </tr>
                        </thead>

                        <tbody>
                            {% for x in note %}
                            <tr>
                                <td>{{ loop.index }}</td>
                                <td>
                                    <strong>{{ x.title }}</strong>
                                </td>
                                <td>{{ x.description }}</td>

                                <td>
                                    <a href="/edit/{{x.id}}" class="btn btn-warning btn-sm">
                                        <i class="bi bi-pencil-square"></i> Edit
                                    </a>
                                </td>

                                <td>
                                    <a href="/delete/{{x.id}}"
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirm('Are you sure you want to delete this note?')">
                                        <i class="bi bi-trash"></i> Delete
                                    </a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>

                {% else %}

                <div class="alert alert-info text-center">
                    <h5>No Notes Available</h5>
                    <p class="mb-0">Click the "Add Note" button to create your first note.</p>
                </div>

                {% endif %}

            </div>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
