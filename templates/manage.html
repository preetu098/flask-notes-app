<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Notes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="text-center mb-5">
        <h1 class="text-warning">
            <i class="bi bi-gear-fill"></i> Manage Notes
        </h1>
        <p class="lead text-muted">
            Manage all your notes from one place.
        </p>
    </div>

    <div class="row g-4">

        <!-- View Notes -->
        <div class="col-md-6">
            <div class="card shadow border-0 h-100">
                <div class="card-body text-center">
                    <i class="bi bi-card-list display-3 text-primary"></i>

                    <h3 class="mt-3">View Notes</h3>

                    <p>
                        Browse all saved notes.
                    </p>

                    <a href="/all_notes" class="btn btn-primary">
                        View Notes
                    </a>
                </div>
            </div>
        </div>

        <!-- Add Notes -->
        <div class="col-md-6">
            <div class="card shadow border-0 h-100">
                <div class="card-body text-center">
                    <i class="bi bi-plus-circle-fill display-3 text-success"></i>

                    <h3 class="mt-3">Add New Note</h3>

                    <p>
                        Create and save a new note.
                    </p>

                    <a href="/add" class="btn btn-success">
                        Add Note
                    </a>
                </div>
            </div>
        </div>

    </div>

    <div class="text-center mt-5">
        <a href="/" class="btn btn-secondary">
            <i class="bi bi-house-fill"></i> Back to Home
        </a>
    </div>

</div>

</body>
</html>
